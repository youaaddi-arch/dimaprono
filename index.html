<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>Dima Prono ⚽ — Pronostics Coupe du Monde entre amis</title>
  <meta name="description" content="Pronostiquez les matchs de la Coupe du Monde entre amis, gagnez des points et grimpez sur le podium. Une surprise pour les 3 premiers !" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="topbar">
      <div class="brand" id="brandHome">
        <img class="brand-logo-img" src="assets/logo.png" alt="Dima Prono"
             onerror="this.onerror=null;this.src='assets/logo.svg'" />
        <span class="brand-name">Dima<span class="brand-accent">Prono</span></span>
      </div>
      <button class="who-chip" id="whoChip" title="Changer de joueur">
        <span id="whoAvatar">🙂</span>
        <span id="whoName">Invité</span>
      </button>
    </header>

    <!-- Tabs -->
    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-tab="matches"><span>⚽</span>Matchs</button>
      <button class="tab" data-tab="ranking"><span>🏆</span>Classement</button>
      <button class="tab" data-tab="podium"><span>🎁</span>Podium</button>
      <button class="tab" data-tab="admin"><span>⚙️</span>Orga</button>
    </nav>

    <div id="netBadge" class="net-badge off" title="État de la synchronisation">🟡 Local (cet appareil)</div>

    <main id="main">
      <!-- views injected here -->
    </main>

    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <!-- Modal: choose player -->
  <div class="modal-backdrop" id="playerModal" hidden>
    <div class="modal">
      <h2>Qui joue&nbsp;? 🎮</h2>
      <p class="muted">Choisis ton profil ou crée-en un nouveau.</p>
      <div id="playerList" class="player-pick"></div>
      <div class="new-player">
        <p class="muted" style="margin:0;font-size:13px">Nouveau ? Crée ton profil :</p>
        <div class="avatar-row" id="avatarRow"></div>
        <input id="newPlayerName" maxlength="18" placeholder="Ton pseudo (ex: Yousra)" />
        <input id="newPlayerPin" inputmode="numeric" maxlength="8" placeholder="🔒 Ton code secret (4 à 8 chiffres)" />
        <button class="btn btn-primary" id="addPlayerBtn">Créer mon profil</button>
        <p class="muted" style="margin:0;font-size:12px">🔒 Ton code secret te permet de te connecter et empêche les autres de jouer à ta place ou de voir tes pronos.</p>
      </div>
    </div>
  </div>

  <canvas id="confetti" class="confetti-canvas"></canvas>

  <script src="assets/app.js"></script>
</body>
</html>
