<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#e6b422"/>
      <stop offset="100%" stop-color="#9a7414"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="60" cy="60" r="47" fill="none" stroke="#3a2f10" stroke-width="1.5"/>
  <!-- ballon -->
  <g transform="translate(60 50)">
    <circle r="22" fill="url(#gold)" stroke="#7a5c10" stroke-width="1.5"/>
    <polygon points="0,-9 8.5,-3 5,7 -5,7 -8.5,-3" fill="#111"/>
    <path d="M0,-22 L0,-13 M-8.5,-3 L-18,-8 M8.5,-3 L18,-8 M-5,7 L-9,18 M5,7 L9,18" stroke="#111" stroke-width="2.2" fill="none"/>
  </g>
  <!-- orbite -->
  <path d="M18,58 A42,20 -18 0 0 100,44" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <!-- barres stats -->
  <g fill="url(#gold)">
    <rect x="78" y="60" width="5" height="12" rx="1"/>
    <rect x="86" y="54" width="5" height="18" rx="1"/>
    <rect x="94" y="47" width="5" height="25" rx="1"/>
  </g>
  <!-- étoiles -->
  <g fill="url(#gold)">
    <path d="M60,10 l2,4 4,.5 -3,3 .8,4.5 -3.8,-2 -3.8,2 .8,-4.5 -3,-3 4,-.5 z"/>
  </g>
  <!-- bandeau -->
  <g>
    <rect x="20" y="82" width="80" height="26" rx="5" fill="#111" stroke="url(#gold)" stroke-width="2.5"/>
    <text x="60" y="94" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="#f5f5f5">DIMA</text>
    <text x="60" y="104" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="8" fill="url(#gold)" letter-spacing="1">PRONO</text>
  </g>
</svg>
